# AI Capability Maturity Model — DSL Specification
# Version: 2.1
# Date: 2026-03-16
# Author: Protocolized (Protocols for Business Group)
# Prior version: ai-cmm-v2.yaml (v2.0)
# Changes from v2.0: table analysis pass — protocol trade pattern note, L1 design range
#   framing, L2→3 discovery protocol note, L5 containerization historical analogue
# Changes from v1: see resource-critique-v2.md (consolidated change list)
# Evaluated against: evaluation-criteria.md
#
# Central argument:
#   Organizations fail at AI adoption because they apply enterprise-software governance
#   logic to a probabilistic, non-deterministic stack. Capability maturity measures how
#   precisely an organization governs the uncertainty AI systems produce at every output.
#
# Governing uncertainty, defined:
#   Three conditions must hold: (1) the organization knows which AI outputs require
#   human verification; (2) a defined process exists for that verification; (3) a
#   feedback mechanism exists when verification fails. An organization that cannot
#   describe all three for any AI output is at Level 1 or 2.
#
# Heterogeneity stance — bottleneck:
#   Organizations occupy different levels across departments. The effective maturity
#   level for risk purposes is the bottleneck: the highest-value, highest-stakes function
#   where governance is weakest. Track departmental profiles separately for planning.
#
# On reading protocol_dimension ratings:
#   Ratings are diagnostic, not additive. Advancing one dimension while leaving others
#   unchanged does not constitute level advancement. Dimensions are interdependent —
#   a Level 5 tooling score does not compensate for Level 1 governance.
#   (Source: Microsoft RAI Maturity Model, 2023)
#
# Theoretical basis for dimension ordering:
#   Each dimension tracks the progression from smooth to striated behavior space.
#   At Level 1, AI use is smooth — anything is possible, nothing is constrained.
#   At Level 5, AI use is fully striated — defined protocols govern which actions are
#   permissible, by whom, and with what verification. Maturity is the progressive
#   conversion of optionality into governed structure.
#   (Source: Rao, "Constructing the Evil Twin of AI," 2025)
#
# Protocol trade pattern:
#   Protocols do not eliminate problems — they trade one class of persistent problem
#   for a new one. Email traded slow communication for attention overload. Git traded
#   serialized release limits for merge governance tensions. Each level's failure modes
#   in this model are the predictable new persistent problems produced by adopting the
#   previous level's protocol. Organizations moving between levels are not escaping
#   problems — they are trading known problems for better-class problems.
#   Today's AI friction patterns signal that existing work protocols are being pushed
#   beyond their design range by a new tool class. That is the diagnostic, not a
#   judgment.
#   (Source: "Table Learning to See Business Protocols," Protocolized, 2026; catalog entry 35)

---

schema:
  name: "ai-cmm"
  version: "2.1"

  protocol_dimension_values:
    # Each value set is ordered from least to most mature.
    governance:           [absent, reactive, mandated, designed, systematized, infrastructure]
    tooling:              [personal, sanctioned, standardized, purpose-built, native]
    uncertainty_handling: [ignored, absorbed, reviewed, governed, systematized, generative]
    coordination:         [ad_hoc, mandated, designed, automated, infrastructure]
    feedback_loops:       [none, reactive, systematic, predictive, generative]
    verification:         [none, informal, procedural, metriced, self-correcting]

  ai_exposure_values:
    # Exposure level affects urgency, not level placement.
    # High-exposure organizations at Level 1 face materially higher incident risk.
    values:    [low, moderate, high, extreme]
    low:       "AI adoption is optional for competitive survival in this sector"
    moderate:  "AI adoption is accelerating in this sector; early movers are gaining advantage"
    high:      "AI capability is becoming table stakes in this sector; late adopters face competitive disadvantage"
    extreme:   "AI governance failures in this sector produce regulatory, legal, or financial consequences within 12 months of exposure"

  stuck_pattern_values:
    # Why an organization is stuck at a given level (from Accenture Art of AI Maturity, 2024)
    foundation_gap:      "Adequate strategy and culture; inadequate data infrastructure, governance tooling, and technical controls"
    differentiation_gap: "Adequate infrastructure; inadequate strategic commitment, leadership sponsorship, and organizational culture"
    both:                "Deficits in both foundation and differentiation capabilities"

  case_anchor_position_values: [early, middle, late, transitional]
  claim_status_values:         [documented, synthesis, projected]


model:
  name: "AI Capability Maturity Model"
  version: "2.1"
  publisher: "Protocolized / Protocols for Business Group"
  date: "2026-03-16"
  prior_version: "ai-cmm-v2.yaml (2.0)"
  evaluation_doc: "evaluation-criteria.md"
  critique_doc: "resource-critique-v2.md"

  central_argument: >
    Most organizations fail at AI adoption because they apply enterprise-software
    governance logic — designed for deterministic processes — to a probabilistic,
    non-deterministic stack. A capability maturity model for AI adoption differs from
    previous CMMs because the unit of maturity is not process compliance. It is the
    organization's ability to govern uncertainty productively: to define what human
    oversight AI outputs require, to enforce that oversight, and to learn from failures.

  protocol_lens: >
    AI tools are coordination mechanisms between humans and probabilistic systems.
    The recurring friction patterns — shadow adoption, quality risk, trust collapse,
    over-reliance — are protocol failures: breakdowns in the rules governing how
    humans and AI systems interact.
    Levels 1–3 describe organizational protocol states. Levels 4–5 describe
    market and civilizational protocol states, where the same maturity logic applies
    at progressively larger scales. No existing AI maturity model reaches beyond
    the organizational boundary. This one does.

  unit_of_analysis_progression:
    level_1: "Individual employee"
    level_2: "Organization"
    level_3: "Business model / competitive position"
    level_4: "Industry / market"
    level_5: "Civilization / planetary systems"

  empirical_anchors:
    level_distribution:
      source: "Menlo Ventures 2025 State of GenAI in the Enterprise"
      catalog_entry: 17
      finding: "16% of enterprise deployments qualify as true agents"
      implication: "~84% of organizations are at Level 1 or 2 as of 2025"
    executive_gap:
      source: "IBM CEO Survey 2024"
      catalog_entry: 34
      finding: "61% of CEOs are pushing AI adoption faster than employees are comfortable with; 39% report adequate governance"
    shadow_adoption_lag:
      source: "Reco.ai State of Shadow AI 2025"
      catalog_entry: 34
      finding: "71% of enterprise employees use unauthorized AI tools; average discovery lag is 400+ days"
    workflow_redesign:
      source: "McKinsey State of AI 2025"
      catalog_entry: 18
      finding: "High performers redesign workflows, retrain workers, and govern errors systematically; average adopters only provide access"


# ─────────────────────────────────────────────
# LEVEL DEFINITIONS
# ─────────────────────────────────────────────

levels:

  - id: 1
    name: "Shadow"
    tagline: "AI is in use. The organization doesn't know how, by whom, or with what data."
    unit_of_analysis: "Individual employee"

    description: >
      AI tools have entered through employee initiative, not organizational decision.
      Individual workers use personal accounts — ChatGPT, Claude, Copilot — for work tasks.
      No policy governs this. No tooling controls it. No one has a complete picture of what
      organizational data is being submitted to which systems.
      The absence of a governance protocol is itself invisible: organizations don't feel like
      they're at Level 1 because nothing has gone wrong yet. The typical organization is at
      Level 1 for 400+ days before a shadow AI incident surfaces. This is not a failure state
      — it is the baseline. Every organization passes through it. The failure condition is
      remaining here while AI exposure grows.
      Shadow adoption is the observable signal that existing work protocols — designed before
      AI tools existed — are being pushed beyond their design range. The disruption event has
      arrived; the protocol response has not yet been adopted.

    diagnostic_tool:
      name: "AI tool inventory"
      method: >
        Ask five employees in different functions: what AI tools do you use for work, and
        which are on personal accounts? If IT cannot independently answer this question, the
        organization is at Level 1.
      pass_condition: "IT can name all AI tools in active use and the account type for each"

    observable_indicators:
      - "Employees use personal ChatGPT, Claude, or Copilot accounts for work tasks"
      - "No organizational AI use policy exists or has not been communicated consistently"
      - "IT has no inventory of AI tools in use across the organization"
      - "Security or legal has not reviewed AI tool data handling or terms of service"
      - "AI-generated outputs are not distinguished from human-generated outputs in deliverables"
      - "No guidance exists on what data may or may not be submitted to AI services"

    characteristic_tension:
      poles:
        a: "Individual productivity gain through unsanctioned AI use"
        b: "Organizational exposure from ungoverned data submission and unreviewed outputs"
      context: >
        Employees have legitimate reasons to use these tools. The organization has
        legitimate liability concerns. Any governance response without visibility is
        either ineffective (a policy no one follows) or disproportionate (a blanket ban
        that stops sanctioned use without stopping shadow use).

    failure_modes:
      - id: "FM1-1"
        name: "Data leakage to third-party AI services"
        description: >
          Employees submit proprietary source code, meeting transcripts, patient data,
          client information, or trade secrets to consumer AI services via personal accounts.
          The data cannot be recalled. IP exposure is permanent.
        trigger: "Any employee with access to confidential data and a personal AI account"
        documented_instance: "Samsung Electronics, April 2023 — three engineers, three incidents, one month"
        catalog_entry: 28
        status: documented

      - id: "FM1-2"
        name: "Regulatory exposure without awareness"
        description: >
          Data submitted to external AI services creates HIPAA, GDPR, attorney-client
          privilege, or trade secret exposure that the organization cannot detect or
          quantify. Discovery typically occurs 400+ days after initial exposure,
          long after the data has been processed into training pipelines.
        trigger: "Sustained shadow adoption without data classification or access controls"
        documented_instance: "Healthcare sector — 86% of organizations have shadow AI incidents; only 35% can track their own AI usage"
        catalog_entry: 30
        status: documented

    progression_requirements:
      - action: "Conduct an AI tool inventory"
        specifics: >
          Identify which AI tools are in use, by which teams, on which account types
          (personal vs. enterprise). This does not require banning anything.
        done_when: "IT can answer: what AI tools are in active use, and who is using them"

      - action: "Sanction at least one AI tool with reviewed terms of service"
        specifics: >
          Designate one enterprise AI tool (ChatGPT Enterprise, Microsoft Copilot, or
          equivalent) with legal review of data handling terms completed. Communicate
          it as the governed alternative to personal accounts.
        done_when: "At least one AI tool has reviewed terms of service and has been communicated as the sanctioned option"

      - action: "Issue a minimum data boundary policy"
        specifics: >
          State what categories of data may not be submitted to external AI services.
          One page is sufficient. This is not a comprehensive AI governance framework —
          it is a data boundary statement.
        done_when: "Policy exists, has been communicated, and names specific data categories"

    unlock_condition: >
      The organization knows what AI tools are in use, has reviewed data handling terms
      for at least one sanctioned tool, and has issued a minimum data boundary policy.
      Shadow use persists but the organization has visibility into it and a governed
      alternative.

    protocol_dimensions:
      governance:           absent
      tooling:              personal
      uncertainty_handling: ignored
      coordination:         ad_hoc
      feedback_loops:       none
      verification:         none

    case_anchors:
      - name: "Samsung Electronics — ChatGPT data leak and response"
        sector: "Technology / Semiconductor"
        position: middle
        ai_exposure: extreme
        description: >
          Three engineers submitted proprietary source code and meeting transcripts to
          personal ChatGPT accounts within one month. Samsung banned all external AI tools,
          launched Samsung Gauss internally, then selectively re-admitted external tools
          under protocol. The arc — incident → ban → internal alternative → governed
          re-admission — is the best documented Level 1 exit path available.
        catalog_entry: 28
        status: documented

      - name: "Healthcare sector — shadow AI and HIPAA"
        sector: "Healthcare"
        position: middle
        ai_exposure: extreme
        description: >
          86% of healthcare IT executives report shadow AI incidents. 17% of healthcare
          workers admit unauthorized AI tool use. Only 35% of organizations can track
          their own AI usage. Three named 2025 breaches with AI involvement:
          Healthcare Interactive (3M patients), Catholic Health/Serviceaide (483K patients),
          Oracle Health/Cerner (dozens of hospitals).
        catalog_entry: 30
        status: documented

      - name: "Legal profession — AI hallucination sanctions"
        sector: "Legal / Professional Services"
        position: late
        ai_exposure: extreme
        description: >
          550+ sanctioned incidents; 2–3 new cases per day by fall 2025. Escalation from
          individual sanctions to ABA Formal Opinion 512 (July 2024) to 80% of AmLaw 100
          firms establishing governance boards by late 2025. Level 1→2 transition driven
          entirely by regulatory forcing function.
        catalog_entry: 29
        status: documented


  - id: 2
    name: "Sanctioned"
    tagline: "The organization has granted AI access. It hasn't designed what to do with it."
    unit_of_analysis: "Organization"

    description: >
      Leadership has decided AI adoption is strategically necessary and has granted broad
      access: enterprise AI tool licenses, mandates around AI use, or replacement of human
      functions with AI at scale. The access grant is the right move. The failure mode is
      executing it without designing the governing protocol — which tasks, with what review
      process, what quality standard, what escalation path when AI fails.
      Two dynamics characterize Level 2. First, the Time to Mediocrity effect: AI produces
      functional output quickly in most domains, creating genuine early productivity gains
      and concealing the absence of expertise. Second, the financial indicator lag: strong
      financial metrics accumulate at the same time as governance failures, making the
      governance gap invisible until failures become external-facing.
      Level 2 organizations typically achieve high adoption rates and real early gains, then
      encounter a quality floor that the absent governance layer cannot address.

    diagnostic_tool:
      name: "Failure response test"
      method: >
        Ask the team responsible for your most-used AI workflow: what happens when the AI
        produces a wrong answer? If the answer is a shrug, a case-by-case correction, or
        "it hasn't happened," the organization is at Level 2.
      pass_condition: "A defined process exists for what to do when AI fails in at least one core workflow, including who is responsible and what they check"

    stuck_pattern_guidance: >
      Foundation gap: the organization has executive sponsorship but lacks data governance
      infrastructure, access controls, and quality instrumentation. Invest in tooling first.
      Differentiation gap: the infrastructure is adequate but no one owns AI workflow design
      and there is no organizational incentive to slow adoption for governance work.
      Invest in structure and accountability first.

    observable_indicators:
      - "Enterprise AI tool licenses exist and have been broadly rolled out"
      - "AI use is encouraged or mandated but no consistent training exists for reviewing outputs"
      - "No defined process exists for what to do when AI produces an incorrect or harmful output"
      - "Productivity gains are claimed but measured informally or anecdotally"
      - "Different teams use AI differently with no shared standard or expectation"
      - "Quality failures are handled case-by-case rather than by protocol"
      - "Non-technical employees are using AI to perform tasks previously requiring specialist skills, without a governance protocol for those outputs"
      - "AI tool decisions are made at the team level without organizational review"

    characteristic_tension:
      poles:
        a: "Maximizing AI adoption rate and reported productivity gains"
        b: "Building the review protocols that make those gains durable"
      context: >
        Strong financial metrics are a lagging indicator at Level 2. Governance failures
        accumulate faster than financial metrics deteriorate. The mandate produces adoption;
        adoption reveals quality failures; quality failures require protocol; designing
        protocol requires slowing adoption; leadership does not want to slow adoption.
        The organization is caught between the adoption rate it is reporting and the
        governance infrastructure it has not built.

    failure_modes:
      - id: "FM2-1"
        name: "Quality floor collapse"
        description: >
          AI replaces a human step that was simultaneously a production step and a
          quality-check step. Production volume increases; the quality check disappears.
          The gap is invisible in output volume metrics and visible in product quality or
          customer satisfaction. The mechanism is Slopsunami: when content is cheaper to
          produce than to search or verify, output volume overwhelms review capacity and
          quality signal collapses. Failures surface when external parties — customers,
          courts, regulators — raise them rather than internal monitoring.
        trigger: >
          Replacing a human role that served dual production/verification functions with
          AI output, without redesigning the verification step.
        documented_instance: >
          Klarna: customer service AI described internally as lacking empathy and unable
          to handle nuanced problems; CEO reversed course May 2025 and began rehiring
          human agents. Duolingo: native-speaker contractors replaced; cultural accuracy
          concerns from language educators; no formal quality measurement before or after.
        catalog_entry: 31
        status: documented

      - id: "FM2-2"
        name: "Mandate without criteria"
        description: >
          Leadership issues an AI competency requirement with no defined standard for
          compliance. Employees must demonstrate AI use or prove AI cannot do their job,
          but no criteria define what demonstration or proof means. Employees perform AI
          use to satisfy the mandate rather than integrating it meaningfully. The reported
          adoption rate is high; the governance maturity is unchanged.
        trigger: >
          Top-down AI mandate with performance consequences but without defined competency
          standards or workflow-level guidance for non-technical roles.
        documented_instance: "Shopify April 2025 memo — AI non-optional, no competency definition for non-technical roles published"
        catalog_entry: 32
        status: documented

      - id: "FM2-3"
        name: "Chatbot liability gap"
        description: >
          An AI system deployed for customer-facing or legally consequential functions
          provides information that contradicts the organization's formal policy. External
          parties hold the organization responsible regardless of internal disclaimers.
          The gap exposed: AI enforces the formal policy as written, bypassing the
          contextual exceptions that practitioners applied in practice.
        trigger: >
          Deploying AI in external-facing, high-stakes contexts without a review protocol
          for outputs that extend or contradict formal policy.
        documented_instance: >
          Air Canada: chatbot stated bereavement fares could be claimed retroactively;
          actual policy did not permit this; BC Civil Resolution Tribunal ruled Air Canada
          liable. Air Canada's argument that the chatbot was "a separate legal entity"
          was rejected.
        catalog_entry: 29
        status: documented

      - id: "FM2-4"
        name: "Policy/practice gap"
        description: >
          Practiced management allows contextual exceptions that written policy does not.
          When AI systems enforce written policy uniformly, the exceptions disappear.
          The organization discovers that its formal policy was not its actual policy —
          and that employees, customers, and partners had been operating on the practiced
          version. The gap was hidden for years because humans applied judgment; AI
          removes the judgment layer.
        trigger: >
          Deploying AI to automate any workflow where practitioners routinely applied
          judgment that wasn't captured in the written process.
        catalog_entry: 26
        status: synthesis
        source_note: "Per Rafa (Protocolized), 'Finding Fault Lines within the Firm' (2026)"

    progression_requirements:
      - action: "Design one AI-native workflow end-to-end"
        specifics: >
          Select a function where AI is already in use. Document the full workflow:
          what AI does, what the human reviews, what constitutes acceptable output,
          and what the escalation path is for failures. The gravel road standard:
          build a working implementation with live data in ≤10 days.
        done_when: "One workflow is documented, repeatable, and has a named owner"

      - action: "Instrument quality for that workflow"
        specifics: >
          Define a metric that captures output quality, not just output volume.
          Track it. Assign ownership. The metric must be specific enough that a
          failure in the workflow produces a change in the number.
        done_when: "A quality metric exists, is tracked on a defined cadence, and triggers a defined response when it falls below threshold"

      - action: "Build a minimum output review protocol"
        specifics: >
          For AI-generated outputs that go to external parties or govern consequential
          decisions: specify who reviews, what they check, and what constitutes an
          acceptable output. This is not an AI literacy course — it is workflow-specific
          guidance for the people who review AI outputs in a specific context.
        done_when: "Reviewers in at least one workflow can state what they're checking and why"

    unlock_condition: >
      At least one AI workflow is documented end-to-end with a named owner. A quality
      metric exists and is tracked. Failures in that workflow trigger a defined response.
      The organization can describe its verification protocol for that workflow without
      consulting a policy document.

    protocol_dimensions:
      governance:           reactive
      tooling:              sanctioned
      uncertainty_handling: absorbed
      coordination:         mandated
      feedback_loops:       reactive
      verification:         informal

    case_anchors:
      - name: "Klarna — AI-for-all mandate and reversal"
        sector: "Financial Technology"
        position: late
        ai_exposure: extreme
        description: >
          90% daily AI adoption, two-thirds of customer service chats handled by AI in
          first month. $40M claimed profit improvement. CEO reversed course May 2025
          citing quality failures. Rehiring human agents. IPO completed September 2025
          at $17–19B valuation. CEO projects headcount falls from ~3,000 to below 2,000
          via natural attrition by 2030; salary increases rather than headcount growth.
        catalog_entry: 31
        status: documented

      - name: "Shopify — AI non-optional memo"
        sector: "E-commerce Platform"
        position: middle
        ai_exposure: high
        description: >
          April 2025: AI non-optional, teams must prove AI cannot do a task before
          requesting headcount. AI assessments added to hiring. No competency definition
          published for non-technical roles. FY2025: 30% revenue growth, opex fell to
          35% of revenue, headcount flat at ~8,000. Financial performance validates the
          mandate; governance protocol for non-technical roles remains undefined.
        catalog_entry: 32
        status: documented

      - name: "Duolingo — AI-first contractor replacement"
        sector: "EdTech"
        position: late
        ai_exposure: high
        description: >
          10% contractor cut January 2024; AI-first mandate April 2025. CEO clarification
          August 2025: no full-time employees cut, only contractors. FY2025: $1.04B revenue,
          39% growth, $414M net income. Stock down ~50% from peak despite record earnings.
          Gross margin declined 40bp on rising AI costs. Language quality concerns raised
          by educators; no formal quality measurement published.
        catalog_entry: 33
        status: documented


  - id: 3
    name: "Designed"
    tagline: "AI workflows are designed, not improvised. The business model depends on them."
    unit_of_analysis: "Business model / competitive position"

    description: >
      AI is embedded in the core competitive position, not just support functions.
      Workflows are built around AI rather than retrofitted to include it. The organization
      has moved past "which tasks can AI automate" to "which parts of our competitive model
      only work with AI."
      The governance question is no longer how to control AI use. It is how to design
      AI-native protocols that handle failure, versioning, and external dependencies
      without losing the speed advantage that AI provides.
      The limiting constraint at Level 3 is domain expertise, not AI capability. Two
      non-technical operators can run sophisticated AI production pipelines if they can
      articulate the coordination protocol clearly. What they cannot do without domain
      knowledge is specify what good output looks like or where the AI's errors matter.
      Early Level 3: AI is deliberately used across core functions with intentional workflow
      design. Late Level 3: the business model cannot revert to non-AI operation without
      significant competitive loss.

    diagnostic_tool:
      name: "Slacker Index"
      method: >
        Select one core AI-assisted workflow. Measure total lead time (from task start to
        completed output in production). Measure actual AI working time. Divide.
        Slacker Index = total lead time ÷ AI working time.
        A ratio above 5:1 means more than 80% of elapsed time is non-AI — review queues,
        approval chains, handoff delays. The bottleneck is not the AI; it's the downstream
        coordination protocol.
      pass_condition: "Slacker Index below 5:1 for the primary AI workflow; bottlenecks above this threshold have been identified and have owners"
      source: "Blake Scholl, Boom Supersonic Part 2 (catalog entry 8)"

    observable_indicators:
      - "AI is embedded in the core product or production process, not just support functions"
      - "Removing AI from key workflows would require rebuilding them, not substituting a human"
      - "The organization has built internal AI tooling or adapted commercial tools for its specific context"
      - "AI workflow design is owned by a named person with explicit accountability"
      - "AI-related costs are tracked as a first-class operating expense with defined ownership"
      - "Quality failures in AI workflows trigger protocol reviews, not just individual corrections"
      - "The organization can describe its AI governance protocol for its primary workflow in specific written terms"
      - "A defined process exists for AI workflow changes, including testing and rollback"
      - "Industry peers reference this organization's AI practices as a benchmark"

    characteristic_tension:
      poles:
        a: "AI-native internal velocity: iteration speed, design exploration, competitive differentiation"
        b: "External coordination dependencies — regulatory timelines, supplier lead times, partner cycles — that move at human pace"
      context: >
        The organization has built competitive advantage on AI-native internal workflows.
        External actors operate on their own schedules. AI accelerates upstream steps;
        downstream coordination protocols were designed for slower upstream rates.
        The result is temporal divergence: review queues fill faster than reviewers can
        process them, handoffs fail, and the Slacker Index explodes even as individual
        AI tasks complete in seconds.
        (Timber Stinson-Schroff, "Mechanical Currents," 2025: "temporal divergence —
        some clocks accelerate while others do not.")

    failure_modes:
      - id: "FM3-1"
        name: "Temporal divergence breakdown"
        description: >
          AI accelerates production faster than the organization can coordinate with
          external actors. Review queues fill faster than reviewers can process them.
          Handoffs fail. The Slacker Index (total lead time ÷ working time) rises even
          as individual AI tasks complete quickly. The bottleneck has moved from
          production to coordination.
        trigger: >
          AI deployment in production workflows without corresponding redesign of
          downstream coordination protocols.
        documented_instance: >
          Uber: 11% of pull requests opened by agents; code review became the primary
          bottleneck, requiring purpose-built tooling (Code Inbox, U Review) to address.
          AI costs rose 6x in one year as a consequence of scale.
        catalog_entry: 1
        status: documented

      - id: "FM3-2"
        name: "Ontological drift"
        description: >
          Mid-project redefinition of the concepts, categories, or ontologies that AI
          systems depend on becomes extremely expensive at Level 3. AI systems encode
          prior definitions into outputs, training data, and prompt structures. Changing
          a definition requires auditing and revising everything downstream.
          Organizations attempt agile-style iteration on definitions that should have
          been frozen, or freeze definitions that needed to stay flexible.
        trigger: >
          AI deployment in contexts where core domain concepts are still being negotiated
          — new product development, regulatory change, organizational restructuring.
        catalog_entry: 3
        status: documented
        source_note: >
          Sachin Benny: "LLMs make ontological drift extremely expensive; this is the
          structural reason AI development tends toward waterfall-style planning."

      - id: "FM3-3"
        name: "Governance brittleness under versioning"
        description: >
          AI model updates, prompt changes, or tool switches silently alter output
          characteristics that the governance protocol was calibrated for. A review
          process designed for one model's failure modes may not catch the same failures
          in the next model's outputs. The governance protocol is not versioned along
          with the tools it governs.
        trigger: >
          AI tool updates without corresponding review and update of governance protocols
          that depend on the old tool's behavior characteristics.
        status: synthesis

      - id: "FM3-4"
        name: "Custom implementation accumulation"
        description: >
          Internal AI capability builds custom solutions that solve specific problems
          but never abstract into reusable platform features. The organization has the
          costs and complexity of Level 3 with Level 2 leverage: each new use case
          requires a new custom build, and standardization becomes politically
          impossible because every team owns its own implementation.
        trigger: >
          No feedback loop requiring custom AI work to be evaluated for platform
          abstraction. Internal teams optimize for their own workflows; no one owns
          the platform view.
        catalog_entry: 6
        status: synthesis
        source_note: "Thomas Otter: long-term platform risk from FDE/custom implementation model."

    progression_requirements:
      - action: "Define and freeze the domain ontology before deployment"
        specifics: >
          Name the concepts, categories, and definitions that AI systems will depend on.
          Establish a change process — not preventing change, but making changes deliberate
          and triggering downstream audits when they occur. This is the Level 3 equivalent
          of schema migrations in software: necessary, expensive if unmanaged.
        done_when: "Core domain concepts used by AI systems are documented and have a defined change process"

      - action: "Address temporal divergence in at least one workflow"
        specifics: >
          Calculate the Slacker Index for the primary AI workflow. Where the ratio
          exceeds 5:1, identify the downstream coordination bottleneck (review queue,
          approval chain, handoff delay) and redesign the coordination protocol —
          not the AI step — to handle the accelerated upstream rate.
        done_when: "Slacker Index below 5:1 for primary workflow; the bottleneck owner has been named"

      - action: "Build a platform feedback loop"
        specifics: >
          When custom AI work is built for a specific use case, evaluate whether it
          can be abstracted into a reusable platform feature. If not, document why not.
          This prevents custom implementation accumulation (FM3-4).
        done_when: "A review process exists for new AI implementations that includes a platform abstraction evaluation"

      - action: "Crystallize domain knowledge into explicit specifications"
        specifics: >
          Document what good output looks like, what constitutes an acceptable AI error
          in this domain, and who has the domain expertise to judge. Domain knowledge
          is the limiting constraint at Level 3 — not AI capability. The specifications
          produced here become the input to Level 4 governance standards.
        done_when: "Quality criteria for primary AI workflows are documented and attributable to named domain experts"

    unlock_condition: >
      The organization can describe, in writing, the protocol governing its primary
      AI-dependent workflow — including the AI's role, the human verification step,
      quality criteria, failure escalation path, and the process for updating the
      protocol when tools change. Internal AI platform or tooling exists beyond
      off-the-shelf configuration. Industry peers benchmark against this organization's
      AI practices.

    protocol_dimensions:
      governance:           designed
      tooling:              purpose-built
      uncertainty_handling: governed
      coordination:         designed
      feedback_loops:       systematic
      verification:         procedural

    case_anchors:
      - name: "Boom Supersonic — mkBoom and AI-native design"
        sector: "Aerospace / Manufacturing"
        position: late
        ai_exposure: high
        description: >
          mkBoom automates full aircraft analysis from a parametric config file; the design
          methodology depends on it. Jevons's Law: cheap iteration enables design exploration
          previously unaffordable — Boomless Cruise was discovered through iteration, not
          planned. Slacker Index applied: turbine blade lead time reduced from 6 months to
          24 hours via vertical integration ($2M printer paid for itself in one set of blades).
          Zero safety incidents across XB-1 program. Business model dependent on AI;
          aerospace industry has not adopted mkBoom-equivalent as standard practice.
        catalog_entry: 7
        status: documented

      - name: "Uber — agentic shift (transitional Level 3→4)"
        sector: "Technology / Mobility"
        position: transitional
        ai_exposure: extreme
        description: >
          84% developer agentic adoption; 65–72% of IDE code AI-generated; Claude Code
          usage doubled in 3 months (32%→63%). AI costs up 6x since 2024. Code review
          became the primary bottleneck; Uber built purpose-built tooling: Code Inbox,
          U Review, Shepherd, Minion, Autocover. Four-layer internal AI platform constructed.
          Moving toward Level 4 as internal platform matures and engineering productivity
          baseline recalibrates.
        catalog_entry: 1
        status: documented

      - name: "Venkatesh Rao / Jenna Dixon — factory-to-factory publishing pipeline"
        sector: "Publishing / Media"
        position: early
        ai_exposure: moderate
        description: >
          Two non-technical operators running Claude Code factories coordinated via
          explicit F2F protocol. Dozens of books in simultaneous production. Domain
          knowledge — publishing, editing, design — identified as the limiting constraint,
          not AI capability. Protocol governs handoff; neither factory needs to understand
