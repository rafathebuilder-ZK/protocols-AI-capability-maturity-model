        catalog_entry: 27
        status: documented


  - id: 4
    name: "Infrastructural"
    tagline: "AI is sector infrastructure. The question is no longer whether to use it but how to govern it collectively."
    unit_of_analysis: "Industry / market"

    description: >
      AI has crossed from organizational competitive advantage to industry infrastructure.
      Most organizations in the sector depend on AI for core operations. The sector's
      productivity baseline has been recalibrated upward to assume AI capability. A new
      entrant without Level 3 AI deployment cannot compete at industry-standard costs or
      speed.
      The governance question is no longer organizational. It is market-structural: how
      does the industry coordinate AI use, handle shared risks, establish standards, and
      prevent concentration of AI capability in ways that produce anti-competitive outcomes?
      Individual organizational maturity is necessary but not sufficient at Level 4.
      The market's governing protocols — standards bodies, regulatory frameworks, shared
      infrastructure, interoperability agreements — determine whether AI capability
      compounds across the sector or concentrates in a small number of actors.
      The frontier/laggard gap that emerges at Level 4 is structural, not temporary:
      organizations that reached Level 3 early have accumulated data, model advantage,
      and talent that cannot be closed through incremental adoption. Late movers face
      permanent disadvantage unless sector-wide governance prevents moat-building.

    diagnostic_tool:
      name: "Market baseline test"
      method: >
        Ask: do industry analyst reports reference AI capability as a given (baseline
        assumption) or as a differentiator? Do job postings in the sector assume AI
        proficiency rather than listing it as a benefit? Has the sector's compensation
        benchmarks adjusted for AI-augmented productivity?
      pass_condition: "AI capability is described as table stakes in sector analyst reports, not as competitive differentiation"
      status: projected

    observable_indicators:
      - "AI capability is referenced in sector analyst reports as a baseline assumption, not a differentiator"
      - "New market entrants deploy AI in core functions from day one — it is not optional"
      - "Sector compensation benchmarks reflect AI-augmented productivity as the baseline"
      - "Sector regulators have issued AI-specific guidance, frameworks, or compliance requirements"
      - "Trade associations or standards bodies are developing sector-wide AI governance standards"
      - "AI failures at one organization produce sector-wide regulatory scrutiny, not just organizational scandal"
      - "At least one major sector player has published AI governance practices that others formally benchmark against"

    characteristic_tension:
      poles:
        a: "Industry standardization of AI protocols — enabling coordination, interoperability, and regulatory clarity"
        b: "Organizational differentiation through proprietary AI capability — resisting standardization to preserve competitive moats"
      context: >
        Standardization commoditizes what was a competitive advantage. Differentiation
        resists the standardization that would produce sector-wide coordination benefits.
        Incumbents with early AI advantage resist standardization; new entrants and
        regulators push for it. The aftermarket dynamic (Blake Scholl, entry 12): vendors
        with proprietary model advantage have structural incentives to keep adoption complex.

    failure_modes:
      - id: "FM4-1"
        name: "AI capability concentration"
        description: >
          Early AI leaders accumulate proprietary data, model advantage, and talent that
          create structural moats. Late-adopting organizations cannot compete at
          AI-standard productivity. The industry stratifies: a small tier of AI-native
          leaders and a permanently disadvantaged tier. The sector's AI infrastructure
          is controlled by a small number of vendors with aftermarket pricing power.
        trigger: >
          Absence of interoperability standards or regulatory requirements that prevent
          AI capability from becoming a permanent structural advantage.
        catalog_entry: 12
        status: synthesis

      - id: "FM4-2"
        name: "Collective governance failure"
        description: >
          A governance protocol failure at one organization — a major data breach, a
          systematic quality failure, a discriminatory AI system — triggers regulatory
          response that applies to the entire sector, regardless of other organizations'
          governance maturity. The sector is held collectively responsible for the
          practices of its least-governed member.
        trigger: >
          High-visibility AI governance failure at a sector leader, in the absence of
          established sector-wide standards that the failed organization could be
          measured against.
        status: synthesis

    progression_requirements:
      - action: "Sector-level AI governance standards must emerge"
        specifics: >
          Through a standards body, regulatory framework, or voluntary industry compact
          that establishes minimum protocol requirements for AI deployment in the sector.
          Individual organizations cannot drive this transition alone — it requires a
          legitimate convening actor.
        done_when: "A sector-wide minimum standard for AI governance exists and has been adopted by the majority of sector participants"
        status: projected

      - action: "AI infrastructure becomes interoperable at key handoff points"
        specifics: >
          Training data provenance, model evaluation benchmarks, or workflow handoff
          protocols are standardized enough that organizations can exchange AI-assisted
          work products without bilateral negotiation.
        done_when: "At least one category of AI work product can be exchanged between organizations using a shared protocol"
        status: projected

    unlock_condition: >
      AI capability is no longer a competitive differentiator in the sector — it is a
      license-to-operate requirement. Competition has moved to higher-order AI capability:
      model training quality, proprietary datasets, agentic workflow design, or the
      protocols governing AI at the next level of abstraction.

    protocol_dimensions:
      governance:           systematized
      tooling:              native
      uncertainty_handling: systematized
      coordination:         automated
      feedback_loops:       predictive
      verification:         metriced

    case_anchors:
      - name: "Legal profession — sector-wide governance transition (early Level 4)"
        sector: "Legal"
        position: early
        ai_exposure: extreme
        description: >
          By late 2025: 80% of AmLaw 100 firms established AI governance boards. ABA
          Formal Opinion 512 (July 2024) established sector-wide minimum competency
          requirements. The hallucination sanction cascade (550+ incidents, 2–3/day by
          fall 2025) drove the transition from Level 1 (individual shadow use) to early
          Level 4 (sector governance standards) in approximately 24 months. First sector
          with this arc documented at scale.
        catalog_entry: 29
        status: documented

      - name: "No fully realized Level 4 sector as of March 2026"
        sector: "Multiple"
        position: early
        ai_exposure: high
        description: >
          Candidate leading indicators: Bloomberg Terminal infrastructure (financial data),
          AI-assisted drug discovery as emerging R&D standard (pharmaceutical), healthcare
          HIPAA Security Rule overhaul proposal (January 2026) as regulatory forcing function,
          EU AI Act sector-specific rules.
        status: projected


  - id: 5
    name: "Planetary"
    tagline: "AI is invisible infrastructure for civilization-scale coordination. The governance challenge is legibility, not adoption."
    unit_of_analysis: "Civilization / planetary systems"

    description: >
      AI protocols have been metabolized into the infrastructure governing coordination
      at civilizational scale: energy grids, financial markets, healthcare systems,
      climate monitoring, supply chain logistics, environmental governance. These are
      not AI deployments that organizations chose. They are protocols that operate
      whether or not any individual organization adopted AI.
      The governance challenge at Level 5 is not organizational or sectoral. It is
      civilizational: who governs the governing protocols? What happens when invisible
      infrastructure fails? How does the protocol layer remain governable when it has
      become too embedded to audit?
      This is what Venkatesh Rao describes as "New Nature" (Theorizing Protocolization I,
      2026): a planetary condition increasingly governed by laws of the artificial,
      engineered to be nearly as immutable as natural law. The primary risk at Level 5
      is not AI capability failure. It is protocol legibility failure: the infrastructure
      works so well that the knowledge required to govern it atrophies, until a failure
      reveals that no one knows how to intervene.
      The closest historical precedent is ISO containerization (1960s–present): a physical
      interface protocol that standardized global cargo handling, became invisible
      infrastructure, and traded local handling inefficiency for systemic supply-chain
      fragility. When containerized logistics converged with internet protocols, the Maersk
      ransomware attack (2017) revealed the characteristic failure mode — a converged attack
      surface with no governance framework adequate to the combined system. The printing
      press offers a second analogue at civilizational scale: a production protocol that
      made knowledge dissemination orders of magnitude cheaper, became structural
      infrastructure for the Reformation and the Scientific Revolution, and generated
      governance problems — censorship regimes, information wars, epistemological
      fragmentation — that took centuries to partially resolve.
      No civilization has reached Level 5 as of 2026. This level is a forward projection
      grounded in the observed trajectory of protocol evolution.

    diagnostic_tool:
      name: "Legibility audit"
      method: >
        Ask: if a critical AI protocol failed tomorrow, which organizations have the
        authority and the knowledge to intervene? Can that intervention be executed in
        hours, or would it take months of forensic work to understand the failure?
      pass_condition: "Named actors exist with both the authority and the technical capacity to intervene in the protocol layer within hours of a failure"
      status: projected

    observable_indicators:
      - "AI systems govern real-time allocation of critical infrastructure resources (grid, water, logistics)"
      - "Financial market microstructure depends on AI protocols operating faster than human oversight can follow"
      - "Climate and environmental monitoring uses AI to detect and respond to conditions in real time"
      - "Healthcare diagnostic and treatment pathways are governed by AI protocols at population scale"
      - "Public policy modeling depends on AI-generated analysis as primary input"
      - "The protocols governing AI infrastructure are not fully legible to any single organization or regulator"

    characteristic_tension:
      poles:
        a: "Coordination efficiency through invisible, automated, planetary-scale AI protocols"
        b: "Governance legibility: the ability for human actors to audit, intervene in, and redesign the protocols that govern civilization"
      context: >
        The same invisibility that makes planetary AI infrastructure work — it operates
        below the threshold of human attention — makes it ungovernable through traditional
        oversight mechanisms. Governance requires legibility; efficiency requires invisibility.
        Protocols that produce coordination at planetary scale do so by not being subject to
        human intervention at each step.
        Vaccination protocols succeeded so thoroughly that the logic behind them became
        invisible, enabling vaccine denialism among populations they protect. Nuclear
        non-proliferation protocols retreated so far into the background that the active
        maintenance required to sustain them is no longer legible as maintenance.
        AI infrastructure faces the same dynamic at civilizational scale.
        (Source: Rao & Nast, "Theorizing Protocolization I," 2026)

    failure_modes:
      - id: "FM5-1"
        name: "Protocol opacity cascade"
        description: >
          Invisible AI infrastructure fails in a way not attributable to any single
          organization, model, or decision. The failure propagates through interdependent
          systems (grid → logistics → healthcare → finance) faster than human oversight
          can respond. No single actor has the authority or information to intervene.
          Post-hoc analysis cannot reconstruct the causal chain because the protocols
          that failed were not documented at the required resolution.
        trigger: >
          Civilizational dependency on AI protocols whose failure modes have not been
          modeled, whose interdependencies are not mapped, and whose governance requires
          cross-jurisdictional coordination that does not yet exist.
        status: projected
        analogue: >
          Maersk ransomware attack (2017): containerization and internet infrastructure
          converged into a single attack surface. No governance framework could address
          the converged system. The incident has not entered engineering or management
          textbooks because no adequate theoretical framework exists to describe it.
          (Source: Rao et al., "Theorizing Protocolization II," 2026)

      - id: "FM5-2"
        name: "Literacy collapse"
        description: >
          The generation of practitioners who understand how the underlying AI protocols
          work retires or moves on. The protocols continue to function, but no one
          understands them well enough to modify them safely when conditions change.
          Governance becomes ritual: forms are completed, audits conducted, but no
          actor can intervene in the actual protocol layer because the required knowledge
          no longer exists.
        trigger: >
          Success of AI infrastructure protocols in making themselves invisible, without
          corresponding investment in maintaining the human literacy required to govern them.
        status: projected
        source_note: >
          Vaccination protocols' success created vaccine denialism by making their logic
          invisible. Nuclear non-proliferation retreated into background invisibility.
          AI infrastructure faces the same dynamic at planetary scale.
          (Source: Rao & Nast, "Theorizing Protocolization I," 2026, catalog entry 21)

    progression_requirements:
      - status: not_applicable
        notes: >
          Level 5 is the current theoretical endpoint. Progression within Level 5 means
          developing governance mechanisms adequate to the legibility challenge:
          protocol transparency infrastructure, cross-jurisdictional governance frameworks,
          and active literacy maintenance programs — the equivalent of ongoing nuclear
          safety culture at civilizational scale.

    unlock_condition: null
    notes: "Level 5 is an endpoint, not a waypoint."

    protocol_dimensions:
      governance:           infrastructure
      tooling:              native
      uncertainty_handling: generative
      coordination:         infrastructure
      feedback_loops:       generative
      verification:         self-correcting

    case_anchors:
      - name: "ISO Containerization (1960s–present) — historical analogue"
        sector: "Global logistics / Physical infrastructure"
        position: late
        ai_exposure: null
        description: >
          The closest realized historical precedent for Level 5 protocol embedding.
          Pre-ISO: cargo handling was locally optimized based on manual bespoke handling,
          globally inefficient. Disruption: post-war global trade expansion overwhelmed
          bespoke handling. Protocol solution: ISO containerization standards — a physical
          interface protocol standardizing transfer across ships, rail, and trucks.
          New persistent problem: systemic supply-chain fragility; global dependencies
          amplify shocks and congestion.
          When containerized logistics converged with internet protocols, the Maersk
          ransomware attack (2017) revealed the characteristic Level 5 failure mode: a
          converged attack surface with no governance framework adequate to the combined
          system. The failure was not attributable to any single organization. No actor
          had the authority or information to intervene across the combined system.
          The Level 5 AI trajectory follows this pattern: protocols that become planetary
          infrastructure trade local inefficiency for systemic fragility; the governance
          challenge shifts from adoption to legibility of a system that has made itself
          invisible.
        status: historical_analogy
        catalog_entry: 35

      - name: "No confirmed planetary-scale AI case as of March 2026"
        sector: "Multiple"
        position: early
        description: >
          Candidate leading indicators: algorithmic trading at financial market microstructure;
          power grid AI optimization (Metro de Madrid, US utility grid monitoring programs);
          AI-assisted climate modeling at NOAA and equivalent national agencies. The
          Protocolization I/II papers (catalog entries 21–22) provide the theoretical
          frame; empirical cases remain at Level 4 boundary.
        status: projected
        catalog_entry: 21


# ─────────────────────────────────────────────
# TRANSITIONS
# ─────────────────────────────────────────────

transitions:

  - from: 1
    to: 2
    description: >
      The organization moves from individual-driven shadow adoption to deliberate
      organizational access grant. The key change is visibility: leadership acknowledges
      AI is in use and makes a decision about it, rather than discovering it reactively.

    common_catalysts:
      - "A shadow AI incident (data leak, quality failure, legal exposure) creates organizational urgency"
      - "Competitor AI capability becomes visible and creates executive pressure"
      - "A specific AI-assisted success in one team generates demand for broader access"
      - "A vendor or consultant engagement creates organizational awareness and a purchase decision"

    common_blockers:
      - "Security or legal issues a blanket ban rather than a governance protocol, stopping sanctioned use without stopping shadow use"
      - "The incident that would catalyze action has not yet occurred and no proactive inventory has been conducted"
      - "AI has been delegated to IT without giving IT authority to make organizational decisions about it"

    transition_mechanisms:
      - name: "Regulatory forcing function"
        description: "External pressure — sanctions, regulatory guidance, sector governance standards — makes shadow adoption cost-visible faster than internal governance would"
        documented_example: >
          Legal profession: individual hallucination sanctions → ABA Formal Opinion 512 →
          80% AmLaw 100 governance boards in approximately 24 months
        catalog_entry: 29

      - name: "Incident-driven exit"
        description: "A specific shadow AI incident creates urgency for the ban → governed alternative → selective re-admission arc"
        documented_example: >
          Samsung: three ChatGPT incidents in one month → blanket ban → Samsung Gauss
          internal LLM → selective re-admission under protocol, 2023–2025
        catalog_entry: 28

    documented_evidence:
      - source: "McKinsey State of AI 2025"
        finding: "High performers redesign workflows, retrain workers, and govern errors systematically; average adopters only provide access"
        catalog_entry: 18

  - from: 2
    to: 3
    description: >
      The organization moves from broad access without workflow design to AI embedded
      in core competitive function. The key change is design intentionality: workflows
      are built for AI, not retrofitted to include it, and the organization's competitive
      position depends on them.
      At the sector level, this is the transition window when slop management is acute:
      AI-generated content is cheaper to produce than to verify, and no widely adopted
      discovery protocol yet resolves it. Organizations reaching Level 3 are building those
      protocols themselves — output standards, quality metrics with named owners, domain
      expertise embedded as the governing constraint on what the AI produces.

    common_catalysts:
      - "A quality failure at Level 2 forces workflow redesign — the governance gap becomes external-facing (Klarna reversal)"
      - "A competitor demonstrates AI-native capability that produces qualitatively different outputs, not just faster ones"
      - "An internal champion builds a designed workflow that becomes a model for other teams"
      - "An FDE or equivalent embeds with a team and designs the workflow protocol from scratch"

    common_blockers:
      - "Level 2 financial metrics are positive, making the governance gap invisible until it becomes severe"
      - "The mandate framing (AI is non-optional) creates compliance theater that substitutes for genuine integration"
      - "AI costs are not tracked as first-class operating expenses, making Level 3 investment economically unlegible"
      - "No one owns AI workflow design — it has been distributed to teams without a platform owner"

    transition_mechanisms:
      - name: "Vertical integration"
        description: "Build internal AI capability to reduce external dependency and collapse the Slacker Index"
        documented_example: "Boom Supersonic: internalizing manufacturing reduced turbine blade lead time from 6 months to 24 hours"
        catalog_entry: 8

      - name: "Translation work (FDE model)"
        description: >
          Embed an implementation partner — internal or external — with Auftragstaktik
          autonomy to design the workflow protocol from scratch with live data in ≤10 days
        documented_example: "Scianna gravel road methodology: build minimum viable path to working outcome with real data in ≤10 days"
        catalog_entry: 5

      - name: "Operational formalization"
        description: "Governance documentation, ontology crystallization, and quality metric definition that converts practiced management into explicit protocol"
        catalog_entry: 26

  - from: 3
    to: 4
    description: >
      The unit of analysis shifts from organizational to industrial. AI capability moves
      from competitive differentiator to sector infrastructure. This transition is not
      driven by any single organization's maturity decision — it is driven by the
      aggregate of Level 3 organizations reaching density sufficient to recalibrate the
      sector's productivity baseline.

    common_catalysts:
      - "Regulatory framework establishes sector-wide AI governance requirements (HIPAA overhaul, EU AI Act sector rules)"
      - "A high-visibility governance failure produces sector-wide regulatory response"
      - "A standards body publishes AI governance standards that the sector adopts"
      - "Labor market repricing: sector compensation benchmarks adjust to reflect AI-augmented productivity as baseline"

    common_blockers:
      - "Incumbents with AI advantage resist standardization to preserve proprietary moats"
      - "Regulatory frameworks lag behind sector adoption, leaving governance standards undefined"
      - "No sector actor has sufficient legitimacy and motivation to convene standards development"

    transition_mechanisms:
      - name: "Regulatory forcing function"
        description: "Sector regulator issues AI-specific guidance or compliance requirements that establish a minimum governance baseline"
        documented_example: "HIPAA Security Rule overhaul proposal (January 2026) as potential forcing function for healthcare sector"
        catalog_entry: 30

      - name: "Sector governance compact"
        description: "Industry association or standards body convenes AI governance standard development"
        status: projected

  - from: 4
    to: 5
    description: >
      The unit of analysis shifts from industrial to civilizational. AI protocols are
      metabolized into infrastructure governing coordination at scales that transcend
      any single sector. The transition is not a decision made by any actor — it is an
      emergent property of sufficiently dense Level 4 sectors converging on shared protocols.

    common_catalysts:
      - "Multiple Level 4 sectors share AI infrastructure that becomes cross-sector protocol"
      - "Climate or crisis response requires AI-coordinated action across sectors at real-time speed"
      - "Financial system AI protocols extend into adjacent systems (insurance, supply chain, grid)"

    common_blockers:
      - "Cross-jurisdictional governance failures prevent protocol standardization at civilizational scale"
      - "Concentration of AI infrastructure in a small number of private actors prevents neutral protocol governance"
      - "No governance mechanism exists with legitimacy and authority adequate to civilizational-scale AI protocols"

    notes: >
      The Level 4→5 transition has no confirmed precedent. The Maersk ransomware attack
      (2017) is the closest analogue: a failure mode at the boundary of an incipient 4→5
      transition, where containerization and internet infrastructure had converged into a
      single attack surface with no adequate governance framework.
