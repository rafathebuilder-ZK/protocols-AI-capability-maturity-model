open_questions:
  - id: "OQ1"
    question: >
      What is the exact Level 3→4 transition mechanism? The claim is that the
      governance problem scales from intra-organizational to inter-organizational
      when enough sector participants adopt AI in similar ways. But what is
      'enough'? Is there an empirical threshold or is this a gradual shift?
    note: "May need to remain stated as a structural transition rather than a threshold."

  - id: "OQ2"
    question: >
      McKinsey State of AI 2025 — verify 33%→65% adoption figures and the
      three characteristics of high performers from the full PDF before citing.
    action: "Download from mckinsey.com before first draft."

  - id: "OQ3"
    question: "Is 'planetary' the right word for Level 5?"
    decision: "RESOLVED — keep Planetary. Theoretically precise (Theorizing Protocolization I); the level's forward-looking status makes the ambitious framing appropriate."

  - id: "OQ4"
    question: "How explicitly to argue against HBR's 'AI practice' solution while using their evidence?"
    decision: >
      RESOLVED — reference and consider; do not argue against.
      The HBR evidence (intensification is real, self-generated, produces burnout
      without organizational structure to absorb it) grounds why Level 2
      organizations plateau. Their solution ('AI practice': intentional pauses,
      batching, protected human-collaboration time) is not load-bearing to the
      litepaper's thesis — it is an individual coping response, not a structural
      design. One sentence in the prose is sufficient: their diagnosis is
      accurate; protocol design is the structural response their prescription
      does not reach. Handle in a footnote, not in the body argument.

